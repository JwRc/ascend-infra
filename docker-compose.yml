services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ascentio}
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pass}
      # Lidas pelo script em ./postgres-init na primeira subida (volume vazio)
      # para provisionar o banco/usuário do Request Tracker.
      RT_DB_NAME: ${RT_DB_NAME:-rt_database}
      RT_DB_USER: ${RT_DB_USER:-rt_user}
      RT_DB_PASSWORD: ${RT_DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    command: >
      postgres
      -c shared_buffers=128MB
      -c max_connections=100
      -c log_min_duration_statement=1000
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - internal
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB:-ascentio}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server /etc/redis/redis.conf
    volumes:
      - redis_data:/data
      - ./redis/redis.conf:/etc/redis/redis.conf:ro
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  request-tracker:
    image: netsandbox/request-tracker:6.0
    environment:
      RT_DB_TYPE: Pg
      RT_DB_HOST: postgres
      RT_DB_DATABASE: ${RT_DB_NAME:-rt_database}
      RT_DB_USER: ${RT_DB_USER:-rt_user}
      RT_DB_PASSWORD: ${RT_DB_PASSWORD}
      RT_DB_PORT: 5432
      RT_WEB_DOMAIN: ${RT_WEB_DOMAIN:-localhost}
      RT_WEB_PORT: "8080"
      RT_WEB_URL: ${RT_WEB_URL:-http://localhost:8080}
      RT_WEB_PROTOCOL: http
      RT_WEB_HOST: ${RT_WEB_DOMAIN:-localhost}
      RT_ROOT_PASSWORD: ${RT_ROOT_PASSWORD}
    volumes:
      - rt_data:/opt/rt5/var
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    # Não exposto publicamente (sem rota no nginx) — só acessível do host via
    # loopback, para rodar ./rt-setup.sh ou abrir a UI via túnel SSH:
    #   ssh -L 8080:localhost:${REQUEST_TRACKER_PORT:-8080} <host>
    ports:
      - "127.0.0.1:${REQUEST_TRACKER_PORT:-8080}:8080"

  backend-a:
    image: ${REGISTRY}ascend-backend:${BACKEND_IMAGE_TAG:-latest}
    build:
      context: ../ascend-backend
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: postgresql://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-pass}@postgres:5432/${POSTGRES_DB:-ascentio}
      REDIS_URL: redis://redis:6379
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost}
      METRICS_TOKEN: ${METRICS_TOKEN}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      APPLE_CLIENT_ID: ${APPLE_CLIENT_ID:-}
      APPLE_CLIENT_SECRET: ${APPLE_CLIENT_SECRET:-}
      FCM_SERVER_KEY: ${FCM_SERVER_KEY:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@ascentio.com.br}
      TRUSTED_ORIGINS: ${TRUSTED_ORIGINS:-http://localhost}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_COACH_BASE: ${STRIPE_PRICE_COACH_BASE:-}
      STRIPE_PRICE_COACH_EXTRA: ${STRIPE_PRICE_COACH_EXTRA:-}
      STRIPE_PRICE_STANDALONE: ${STRIPE_PRICE_STANDALONE:-}
      RT_BASE_URL: http://request-tracker:8080
      RT_API_USER: ${RT_API_USER:-ascentio-backend}
      RT_API_PASSWORD: ${RT_API_PASSWORD}
      RT_QUEUE: ${RT_QUEUE:-Support}
      RT_TENANT_CUSTOM_FIELD: ${RT_TENANT_CUSTOM_FIELD:-Tenant}
      SLACK_SUPPORT_WEBHOOK_URL: ${SLACK_SUPPORT_WEBHOOK_URL:-}
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      request-tracker:
        condition: service_healthy
    networks:
      - internal
      - observability
    restart: unless-stopped
  backend-b:
    image: ${REGISTRY}ascend-backend:${BACKEND_IMAGE_TAG:-latest}
    build:
      context: ../ascend-backend
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: postgresql://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-pass}@postgres:5432/${POSTGRES_DB:-ascentio}
      REDIS_URL: redis://redis:6379
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost}
      METRICS_TOKEN: ${METRICS_TOKEN}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      APPLE_CLIENT_ID: ${APPLE_CLIENT_ID:-}
      APPLE_CLIENT_SECRET: ${APPLE_CLIENT_SECRET:-}
      FCM_SERVER_KEY: ${FCM_SERVER_KEY:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      TRUSTED_ORIGINS: ${TRUSTED_ORIGINS:-http://localhost}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_COACH_BASE: ${STRIPE_PRICE_COACH_BASE:-}
      STRIPE_PRICE_COACH_EXTRA: ${STRIPE_PRICE_COACH_EXTRA:-}
      STRIPE_PRICE_STANDALONE: ${STRIPE_PRICE_STANDALONE:-}
      RT_BASE_URL: http://request-tracker:8080
      RT_API_USER: ${RT_API_USER:-ascentio-backend}
      RT_API_PASSWORD: ${RT_API_PASSWORD}
      RT_QUEUE: ${RT_QUEUE:-Support}
      RT_TENANT_CUSTOM_FIELD: ${RT_TENANT_CUSTOM_FIELD:-Tenant}
      SLACK_SUPPORT_WEBHOOK_URL: ${SLACK_SUPPORT_WEBHOOK_URL:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      EMAIL_FROM: ${EMAIL_FROM:-no-reply@ascentio.com.br}
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      request-tracker:
        condition: service_healthy
    networks:
      - internal
      - observability
    restart: unless-stopped

  frontend-web:
    image: ${REGISTRY}ascend-frontend:${FRONTEND_IMAGE_TAG:-latest}
    build:
      context: ../ascend-frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
        VITE_AUTH_URL: https://app.ascentio.com.br
        VITE_STRIPE_PUBLISHABLE_KEY: ${VITE_STRIPE_PUBLISHABLE_KEY:-}
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - internal
    restart: unless-stopped
  frontend-web-b:
    image: ${REGISTRY}ascend-frontend:${FRONTEND_IMAGE_TAG:-latest}
    build:
      context: ../ascend-frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
        VITE_AUTH_URL: https://app.ascentio.com.br
        VITE_STRIPE_PUBLISHABLE_KEY: ${VITE_STRIPE_PUBLISHABLE_KEY:-}
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - internal
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    deploy:
      resources:
        limits:
          memory: 128M
    depends_on:
      - backend-a
      - backend-b
      - frontend-web
      - frontend-web-b
    networks:
      - internal
      - observability
    restart: unless-stopped

volumes:
  pgdata:
  redis_data:
  rt_data:

networks:
  internal:
    driver: bridge

include:
  - path: ./observability/docker-compose.yml
    env_file: ./observability/.env
