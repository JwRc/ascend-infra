upstream backend {
    server backend:3000;
}

upstream frontend {
    server frontend-web:80;
}

server {
    listen 80;
    server_name wt.nexiven.com;
    return 301 https://$host$request_uri;
}
server {
    listen 80;
    server_name app.ascentio.com.br;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name app.ascentio.com.br;

    ssl_certificate     /etc/letsencrypt/live/app.ascentio.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.ascentio.com.br/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_ecdh_curve      prime256v1:secp384r1;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # API — /api/foo → backend /foo
    location /api/ {
        proxy_pass         http://backend/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Auth (better-auth) — /auth/foo → backend /auth/foo
    location /auth/ {
        proxy_pass         http://backend/auth/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Swagger docs — /docs → backend /docs
    location /docs {
        proxy_pass         http://backend/docs;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Frontend SPA — todo o resto
    location / {
        proxy_pass         http://frontend/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

