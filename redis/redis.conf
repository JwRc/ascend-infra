# Bind em todas as interfaces (acesso apenas pela rede interna do Docker)
bind 0.0.0.0

# Sem timeout — BullMQ mantém conexões longas
timeout 0

# Persistência AOF (mais seguro que RDB para filas)
appendonly yes
appendfsync everysec
no-appendfsync-on-rewrite no

# Desabilita RDB snapshots (usando AOF)
save ""

# Limite de memória
maxmemory 256mb
maxmemory-policy allkeys-lru

# Log level
loglevel notice
